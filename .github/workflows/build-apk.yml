name: Build SAAVNIFY APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: bun install

      - name: Build Next.js static export
        run: bun run build

      - name: Verify static export
        run: |
          echo "=== Checking out/ directory ==="
          ls -la out/ || (echo "ERROR: out/ directory not found!" && exit 1)
          echo "=== Checking index.html ==="
          test -f out/index.html || (echo "ERROR: index.html not found!" && exit 1)
          echo "=== Checking _next directory ==="
          ls out/_next/ || (echo "ERROR: _next/ not found!" && exit 1)
          echo "=== Checking fonts ==="
          ls out/fonts/ || echo "WARNING: fonts/ not found"

      - name: Remove old android directory (clean build)
        run: rm -rf android

      - name: Add Capacitor Android platform
        run: npx cap add android

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Verify web assets in Android project
        run: |
          echo "=== Checking Android web assets ==="
          test -f android/app/src/main/assets/public/index.html || (echo "ERROR: index.html not in assets!" && exit 1)
          echo "=== Assets size ==="
          du -sh android/app/src/main/assets/public/

      # ── MINIMAL Android patches ──
      # We do NOT overwrite styles.xml or MainActivity.java - Capacitor's defaults are correct.
      # We only add what's absolutely necessary:

      - name: Add Internet permission if missing
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "android.permission.INTERNET" "$MANIFEST"; then
            sed -i 's|</manifest>|<uses-permission android:name="android.permission.INTERNET"/>\n</manifest>|' "$MANIFEST"
            echo "Added INTERNET permission"
          else
            echo "INTERNET permission already exists"
          fi

      - name: Set dark status/nav bar colors
        run: |
          COLORS_FILE="android/app/src/main/res/values/colors.xml"
          mkdir -p android/app/src/main/res/values
          cat > "$COLORS_FILE" << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#1DB954</color>
              <color name="colorPrimaryDark">#090909</color>
              <color name="colorAccent">#1DB954</color>
          </resources>
          XMLEOF
          echo "Created colors.xml with SAAVNIFY brand colors"

      - name: Customize splash screen background
        run: |
          STYLES_FILE="android/app/src/main/res/values/styles.xml"
          if [ -f "$STYLES_FILE" ]; then
            sed -i 's|@drawable/splash|#090909|g' "$STYLES_FILE"
            echo "Updated splash screen background"
          fi

      - name: Patch strings
        run: |
          STRINGS_FILE="android/app/src/main/res/values/strings.xml"
          if [ -f "$STRINGS_FILE" ]; then
            sed -i 's|<string name="title_activity_main">.*</string>|<string name="title_activity_main">SAAVNIFY</string>|' "$STRINGS_FILE"
            echo "Updated app name strings"
          fi

      - name: Build Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk SAAVNIFY-v4.apk

      - name: Upload APK to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.2.0
          name: SAAVNIFY V4 - Piped API Edition (v1.2.0)
          body: |
            # SAAVNIFY V4 - Premium Indian Music Streaming App

            ## Download & Install
            1. Download **SAAVNIFY-v4.apk** below
            2. Enable "Install from Unknown Sources" in Android Settings
            3. Open the downloaded APK and tap Install
            4. Start listening immediately - no API key required!

            ## v1.2.0 - Piped API Edition

            ### NEW: Piped API as Primary Source
            - **Piped API** is now the primary music source (FREE, no API key needed!)
            - Access YouTube's entire catalog including T-Series, Zee Music, YRF, Sony Music India
            - Direct audio stream URLs for smooth playback via HTML5 Audio/ExoPlayer
            - Multi-instance rotation for reliability (7 Piped instances)
            - Automatic fallback when instances are down

            ### Indian Music Catalog (GUARANTEED)
            - Bollywood Hits, Punjabi Hits, Hindi Romantic, Lo-Fi India
            - Workout India, Devotional, Top Artists India
            - Tamil, Telugu, Haryanvi, Bhojpuri, Marathi, Gujarati, Bengali, Kannada, Malayalam
            - New Releases India section
            - Trending India (YouTube trending in India region)

            ### Source Priority
            1. Piped API (primary - free, no key, Indian songs guaranteed)
            2. Local Cache (offline support, 24h+ TTL)
            3. JioSaavn (emergency fallback)
            4. YouTube IFrame Player (always-on fallback for playback)

            ### Performance
            - Sequential search with early termination
            - Aggressive caching (Search 24h, Trending 24h, Home 24h, Artist 7d)
            - Multi-instance rotation with automatic failover
            - Source health tracking with circuit breaker pattern

            ### All Features Preserved
            - Lyrics, Queue, Radio Mode, Smart Playlists
            - Listening History & Analytics
            - Recommendations (India-focused scoring)
            - Full Screen Player & Mini Player
            - 5 Theme Presets (Spotify Dark, AMOLED, etc.)

            ## Note
            This is a debug APK. For production, a signed release build is recommended.
          files: SAAVNIFY-v4.apk
          draft: false
          prerelease: false
